# docker-compose.yml
version: '3.8'

services:
  # 1. Baza podataka (MySQL)
  db:
    image: mysql:8.0
    container_name: researchhub_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: researchhub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  # 2. Backend (Laravel)
  backend:
    build:
      context: ./lab-backend
      dockerfile: Dockerfile
    container_name: researchhub_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mapiranje storage-a kako bi uploadovani PDF-ovi bili vidljivi i na hostu
      - ./lab-backend/storage/app/public:/var/www/html/storage/app/public
    environment:
      # Prepisu .env fajl unutar kontejnera
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:U9CS9thboZhwVsnC198ND2sHmFpIge1vJ5K+vSWs/Gs=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: researchhub
      DB_USERNAME: root
      DB_PASSWORD: root
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      SANCTUM_STATEFUL_DOMAINS: localhost:3000
      # Zaštite
      RECAPTCHA_ENABLED: "false"
      # Resend email
      MAIL_MAILER: resend
      RESEND_API_KEY: re_2Js2hJxw_7DWV1yu4X5k3bJh4ksavdoxn
      RESEND_FROM_EMAIL: onboarding@resend.dev
      MAIL_FROM_ADDRESS: onboarding@resend.dev
      CACHE_STORE: file
      SESSION_DRIVER: file
      # L5 Swagger
      L5_SWAGGER_CONST_HOST: http://localhost:8000
      L5_SWAGGER_GENERATE_ALWAYS: "true"

  # 3. Frontend (React + Vite + Nginx)
  frontend:
    build:
      context: .
      dockerfile: lab-front/Dockerfile
    container_name: researchhub_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
