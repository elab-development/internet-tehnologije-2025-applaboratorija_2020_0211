name: ResearchHub CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # 1. Frontend Testovi
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: Instalacija zavisnosti
        run: npm ci

      - name: Pokretanje Vitest testova
        run: npm run test:run

