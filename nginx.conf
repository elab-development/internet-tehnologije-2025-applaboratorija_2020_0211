# lab-front/nginx.conf

server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Obezbeđuje da React Router preuzme kontrolu nad rutama (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Kesiranje statičkih fajlova za bolje performanse
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
